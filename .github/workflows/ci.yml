name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install dev dependencies
        run: just install-deps
      - name: Typecheck
        run: just typecheck
      - name: Test
        run: just test
      - name: Lint editorconfig
        run: just lint-ec
      - name: Lint markdown
        run: just lint-md
